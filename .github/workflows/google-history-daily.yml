name: Google History Daily Collector

on:
  schedule:
    # 00:00 WIB = 17:00 UTC hari sebelumnya
    - cron: "0 17 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Import date YYYY-MM-DD, optional"
        required: false
        type: string

permissions:
  contents: read

jobs:
  collect-google-history:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Collect Google History into Supabase pending queue
        working-directory: frontend
        env:
          # --- Supabase (service role untuk insert collector data) ---
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

          # --- Google History config ---
          GOOGLE_HISTORY_IMPORT_ENABLED: "true"
          GOOGLE_HISTORY_MODE: ${{ secrets.GOOGLE_HISTORY_MODE }}
          GOOGLE_HISTORY_TIMEZONE: "Asia/Jakarta"

          # --- Google Drive OAuth (jika mode = drive) ---
          GOOGLE_HISTORY_DRIVE_ENABLED: ${{ secrets.GOOGLE_HISTORY_DRIVE_ENABLED }}
          GOOGLE_HISTORY_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_HISTORY_DRIVE_FOLDER_ID }}
          GOOGLE_HISTORY_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_HISTORY_OAUTH_CLIENT_ID }}
          GOOGLE_HISTORY_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_HISTORY_OAUTH_CLIENT_SECRET }}
          GOOGLE_HISTORY_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_HISTORY_OAUTH_REFRESH_TOKEN }}

          # --- Collector behavior ---
          GOOGLE_HISTORY_IMPORT_TO_RAW_ENTRIES: "true"
          GOOGLE_HISTORY_CREATE_PENDING_QUEUE: "true"
          # WAJIB false: tidak boleh menjalankan brain-worker di GitHub Actions
          GOOGLE_HISTORY_RUN_WORKER_AFTER_IMPORT: "false"
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            npm run google:history:collect:date -- --date "${{ github.event.inputs.date }}"
          else
            npm run google:history:collect
          fi

      # =========================================================================
      # PENTING: GitHub Actions TIDAK menjalankan hal-hal berikut:
      # - npm run brain:worker
      # - npm run brain:index
      # - npm run identity:refresh
      # - npm run communication:build
      # - npm run similarity:run
      # - npm run drift:audit
      # - npm run reflection:daily
      # - npm run obsidian:sync
      # - npm run brain:backup
      #
      # Semua proses di atas HANYA berjalan di local brain worker.
      # GitHub Actions hanya collector: ambil data → masuk Supabase → STOP.
      # =========================================================================
